<!doctype html>
<html class="no-js" lang="">

    <head>
        <meta charset="utf-8">
        <title>Antity</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="apple-touch-icon" href="apple-touch-icon.png">
        <link rel="stylesheet" href="css/normalize.min.css">
        <link rel="stylesheet" href="css/main.css">
        <style>
            #performance-dashboard {
                position: fixed;
                top: 10px;
                right: 10px;
                background-color: rgba(0, 0, 0, 0.7);
                color: #fff;
                padding: 10px;
                border-radius: 5px;
                font-family: monospace;
                font-size: 12px;
                z-index: 1000;
                width: 220px;
            }
            #performance-dashboard h2 {
                margin: 0 0 10px 0;
                font-size: 14px;
                border-bottom: 1px solid #555;
                padding-bottom: 5px;
            }
            .metric-row {
                display: flex;
                justify-content: space-between;
                margin-bottom: 5px;
            }
            .metric-label {
                font-weight: bold;
            }
            .metric-value {
                color: #7fdbff;
            }
            .metric-warning {
                color: #ffdc00;
            }
            .metric-danger {
                color: #ff4136;
            }
            .dashboard-toggle {
                position: absolute;
                top: 5px;
                right: 5px;
                background: #555;
                border: none;
                color: white;
                width: 20px;
                height: 20px;
                border-radius: 50%;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 14px;
                padding: 0;
            }
            .hidden-content {
                overflow: hidden;
                max-height: 0;
                transition: max-height 0.3s ease-out;
            }
            .expanded .hidden-content {
                max-height: 500px;
                transition: max-height 0.5s ease-in;
            }
            #entity-state-chart {
                width: 100%;
                height: 30px;
                margin-top: 5px;
                display: flex;
            }
            .state-young { background-color: #aaffaa; }
            .state-mature { background-color: #ffffff; }
            .state-old { background-color: #ffaaaa; }
            
            /* Stress test section styles */
            .stress-test {
                margin-top: 10px;
                padding-top: 10px;
                border-top: 1px solid #555;
            }
            
            .stress-test h3 {
                margin: 0 0 8px 0;
                font-size: 13px;
            }
            
            .stress-button-row {
                display: flex;
                justify-content: space-between;
                margin-bottom: 8px;
            }
            
            .stress-button {
                background-color: #555;
                border: none;
                color: white;
                padding: 3px 5px;
                font-size: 11px;
                border-radius: 3px;
                cursor: pointer;
            }
            
            .stress-button:hover {
                background-color: #777;
            }
            
            .lifespan-control {
                margin-top: 8px;
            }
            
            .lifespan-slider {
                width: 100%;
                margin-top: 5px;
            }
            
            .clear-button {
                background-color: #ff4136;
                width: 100%;
                margin-top: 8px;
                color: white;
                border: none;
                padding: 5px;
                border-radius: 3px;
                cursor: pointer;
            }
            
            .clear-button:hover {
                background-color: #ff6659;
            }
        </style>
    </head>

    <body>
        <h1>Antity</h1>
        
        <!-- Performance Dashboard -->
        <div id="performance-dashboard" class="expanded">
            <button class="dashboard-toggle">-</button>
            <h2>Performance Metrics</h2>
            <div class="hidden-content">
                <div class="metric-row">
                    <span class="metric-label">FPS:</span>
                    <span id="fps-counter" class="metric-value">0</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">Entities:</span>
                    <span id="entity-counter" class="metric-value">0</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">By State:</span>
                    <span class="metric-value">
                        <span id="young-counter">0</span> / 
                        <span id="mature-counter">0</span> / 
                        <span id="old-counter">0</span>
                    </span>
                </div>
                <div id="entity-state-chart">
                    <div class="state-young" style="width: 0%"></div>
                    <div class="state-mature" style="width: 0%"></div>
                    <div class="state-old" style="width: 0%"></div>
                </div>
                <div class="metric-row">
                    <span class="metric-label">Byproducts:</span>
                    <span id="byproduct-counter" class="metric-value">0</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">Eggs:</span>
                    <span id="egg-counter" class="metric-value">0</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">Worker Messages:</span>
                    <span id="message-counter" class="metric-value">0 msg/sec</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">Render Time:</span>
                    <span id="render-time" class="metric-value">0 ms</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">Memory:</span>
                    <span id="memory-usage" class="metric-value">0 MB</span>
                </div>
                
                <!-- Stress Test Section -->
                <div class="stress-test">
                    <h3>Stress Test Tools</h3>
                    <div class="stress-button-row">
                        <button class="stress-button" id="spawn-10">Add 10</button>
                        <button class="stress-button" id="spawn-50">Add 50</button>
                        <button class="stress-button" id="spawn-100">Add 100</button>
                    </div>
                    <div class="stress-button-row">
                        <button class="stress-button" id="spawn-250">Add 250</button>
                        <button class="stress-button" id="spawn-500">Add 500</button>
                        <button class="stress-button" id="spawn-1000">Add 1000</button>
                    </div>
                    <div class="lifespan-control">
                        <label for="lifespan-slider">Entity Lifespan: <span id="lifespan-value">1500</span></label>
                        <input type="range" id="lifespan-slider" class="lifespan-slider" min="100" max="3000" value="1500">
                    </div>
                    <div class="lifespan-control">
                        <label for="entity-limit-slider">Entity Limit: <span id="entity-limit-value">1000</span></label>
                        <input type="range" id="entity-limit-slider" class="lifespan-slider" min="100" max="5000" value="1000">
                    </div>
                    <button class="clear-button" id="clear-all">Clear All Entities</button>
                </div>
            </div>
        </div>

        <script src="js/vendor/pixi.min.js"></script>
        <script>
            window.jQuery || document.write('<script src="js/vendor/jquery-1.11.2.min.js"><\/script>')
        </script>
        <script src="js/vendor/uuid.js"></script>
        <script src="js/byproduct.js"></script>
        <script src="js/antity.js"></script>
        <script src="js/world.js"></script>
        <script>
            // Dashboard toggle functionality
            document.querySelector('.dashboard-toggle').addEventListener('click', function() {
                const dashboard = document.getElementById('performance-dashboard');
                const button = this;
                
                if (dashboard.classList.contains('expanded')) {
                    dashboard.classList.remove('expanded');
                    button.textContent = '+';
                } else {
                    dashboard.classList.add('expanded');
                    button.textContent = '-';
                }
            });
            
            // Initialize stress test controls after world is loaded
            document.addEventListener('DOMContentLoaded', function() {
                // Wait a bit to ensure world is initialized
                setTimeout(() => {
                    if (typeof world !== 'undefined') {
                        initializeStressTest();
                    }
                }, 1000);
            });
            
            function initializeStressTest() {
                // Spawn multiple entities
                function spawnMultiple(count) {
                    const centerX = window.innerWidth / 2;
                    const centerY = window.innerHeight / 2;
                    const radius = Math.min(window.innerWidth, window.innerHeight) * 0.4;
                    
                    let created = 0;
                    for (let i = 0; i < count; i++) {
                        // Distribute in a circle around center
                        const angle = Math.random() * Math.PI * 2;
                        const distance = Math.random() * radius;
                        const x = centerX + Math.cos(angle) * distance;
                        const y = centerY + Math.sin(angle) * distance;
                        
                        // Check if entity was created (might hit entity limit)
                        const result = world.startWorker({
                            left: x,
                            top: y
                        });
                        
                        if (result !== null) {
                            created++;
                        } else {
                            // Entity limit reached
                            break;
                        }
                    }
                    
                    if (created < count) {
                        console.log(`Created ${created}/${count} entities. Entity limit (${world.maxEntities}) reached.`);
                    }
                }
                
                // Clear all entities
                function clearAllEntities() {
                    // Get all entity IDs
                    const entityIds = Object.keys(world.sprites).filter(id => 
                        world.sprites[id].type === 'Antity'
                    );
                    
                    // Kill all entities
                    entityIds.forEach(id => {
                        if (world.workers[id]) {
                            world.workers[id].postMessage({
                                action: 'killAntity',
                                ID: id
                            });
                        }
                    });
                    
                    // Also clear byproducts and eggs
                    const byproductIds = Object.keys(world.sprites).filter(id => 
                        world.sprites[id].type === 'Byproduct' || world.sprites[id].type === 'Egg'
                    );
                    
                    byproductIds.forEach(id => {
                        const sprite = world.sprites[id];
                        if (sprite) {
                            world.killByproduct({
                                ID: id,
                                isAlive: 0,
                                fertile: sprite.type === 'Egg',
                                parentAntityId: sprite.parentAntityId
                            });
                        }
                    });
                }
                
                // Set global lifespan for new entities
                function updateLifespan(value) {
                    world.defaultLifespan = parseInt(value);
                    document.getElementById('lifespan-value').textContent = value;
                }
                
                // Update entity limit
                function updateEntityLimit(value) {
                    world.maxEntities = parseInt(value);
                    // Add visualization for entity limit (e.g., update counter)
                    const currentCount = world.antityCount;
                    const limitDisplay = document.getElementById('entity-counter');
                    
                    // Add limit to the counter display
                    limitDisplay.textContent = `${currentCount}/${value}`;
                    
                    // Add visual indicator if near limit
                    if (currentCount > value * 0.9) {
                        limitDisplay.className = 'metric-value metric-danger';
                    } else if (currentCount > value * 0.7) {
                        limitDisplay.className = 'metric-value metric-warning';
                    } else {
                        limitDisplay.className = 'metric-value';
                    }
                }
                
                // Add button event listeners
                document.getElementById('spawn-10').addEventListener('click', () => spawnMultiple(10));
                document.getElementById('spawn-50').addEventListener('click', () => spawnMultiple(50));
                document.getElementById('spawn-100').addEventListener('click', () => spawnMultiple(100));
                document.getElementById('spawn-250').addEventListener('click', () => spawnMultiple(250));
                document.getElementById('spawn-500').addEventListener('click', () => spawnMultiple(500));
                document.getElementById('spawn-1000').addEventListener('click', () => spawnMultiple(1000));
                
                document.getElementById('clear-all').addEventListener('click', clearAllEntities);
                
                // Lifespan slider
                const lifespanSlider = document.getElementById('lifespan-slider');
                lifespanSlider.addEventListener('input', () => {
                    updateLifespan(lifespanSlider.value);
                });
                
                // Entity limit slider
                const entityLimitSlider = document.getElementById('entity-limit-slider');
                entityLimitSlider.addEventListener('input', () => {
                    updateEntityLimit(entityLimitSlider.value);
                });
                
                // Initialize default values
                world.defaultLifespan = 1500;
                
                // Set initial entity limit display
                updateEntityLimit(world.maxEntities);
            }
        </script>
    </body>

</html>
